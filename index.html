<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>회의 녹음기</title>
<style>
:root{--bg:#ffffff;--surface:#f4f4f5;--border:#e4e4e7;--text:#18181b;--muted:#71717a;--primary:#2563eb;--danger:#ef4444;--r:12px;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding:28px 16px;}
.container{max-width:680px;margin:0 auto;}
header{margin-bottom:28px;}
h1{font-size:20px;font-weight:700;letter-spacing:-.4px;display:flex;align-items:center;gap:8px;}
.subtitle{font-size:13px;color:var(--muted);margin-top:4px;}
.card{background:var(--surface);border-radius:var(--r);padding:20px;margin-bottom:14px;}
.card-title{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;margin-bottom:14px;display:flex;justify-content:space-between;align-items:center;}
.lang-row{display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap;}
.lang-btn{padding:5px 12px;border-radius:20px;border:1.5px solid var(--border);background:transparent;font-size:12px;cursor:pointer;color:var(--muted);transition:all .15s;}
.lang-btn.active{border-color:var(--primary);color:var(--primary);background:#eff6ff;font-weight:600;}
.record-center{display:flex;flex-direction:column;align-items:center;gap:12px;}
.record-btn{width:68px;height:68px;border-radius:50%;border:none;background:var(--primary);color:white;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:transform .2s;box-shadow:0 2px 12px rgba(37,99,235,.25);}
.record-btn:hover{transform:scale(1.06);}
.record-btn.recording{background:var(--danger);box-shadow:0 2px 12px rgba(239,68,68,.3);animation:pulse 1.5s infinite;}
@keyframes pulse{0%,100%{box-shadow:0 2px 12px rgba(239,68,68,.3);}50%{box-shadow:0 0 24px rgba(239,68,68,.55);}}
#eqCanvas{border-radius:8px;display:none;}
.status-badge{font-size:13px;color:var(--muted);display:flex;align-items:center;gap:5px;}
.status-badge .dot{width:7px;height:7px;border-radius:50%;background:var(--muted);}
.status-badge.recording{color:var(--danger);}
.status-badge.recording .dot{background:var(--danger);animation:blink 1s infinite;}
@keyframes blink{50%{opacity:0;}}
.transcript-box{min-height:140px;max-height:260px;overflow-y:auto;font-size:15px;line-height:1.75;white-space:pre-wrap;word-break:break-word;}
.transcript-box.empty{color:var(--muted);font-style:italic;font-size:14px;}
.interim{color:#94a3b8;}
.action-row{display:flex;gap:8px;margin-top:14px;flex-wrap:wrap;}
.btn{padding:8px 16px;border-radius:8px;border:none;font-size:13px;font-weight:500;cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:5px;}
.btn-primary{background:var(--primary);color:white;}
.btn-primary:hover{background:#1d4ed8;}
.btn-primary:disabled{background:#93c5fd;cursor:not-allowed;}
.btn-ghost{background:transparent;border:1.5px solid var(--border);color:var(--muted);}
.btn-ghost:hover{border-color:#a1a1aa;color:var(--text);}
.btn-ghost:disabled{opacity:.4;cursor:not-allowed;pointer-events:none;}
.summary-box{font-size:14px;line-height:1.85;white-space:pre-wrap;min-height:60px;}
.loading-wrap{display:flex;align-items:center;gap:8px;color:var(--muted);font-size:14px;}
.spinner{width:16px;height:16px;border:2px solid var(--border);border-top-color:var(--primary);border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.error-msg{font-size:13px;color:var(--danger);margin-top:10px;text-align:center;}
.wc{font-size:11px;color:var(--muted);font-weight:400;}
.api-key-row{display:flex;gap:8px;margin-bottom:4px;align-items:center;}
.api-input{flex:1;padding:7px 10px;border-radius:8px;border:1.5px solid var(--border);font-size:13px;outline:none;font-family:monospace;}
.api-input:focus{border-color:var(--primary);}
.api-hint{font-size:11px;color:var(--muted);}
.divider{width:1px;height:16px;background:var(--border);margin:0 2px;}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#18181b;color:white;padding:8px 18px;border-radius:20px;font-size:13px;opacity:0;pointer-events:none;transition:opacity .3s;white-space:nowrap;}
.toast.show{opacity:1;}
.topbar{display:flex;align-items:center;gap:8px;margin-bottom:14px;}
.icon-btn{width:38px;height:38px;border-radius:10px;border:1.5px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;}
.icon-btn:hover{border-color:var(--primary);color:var(--primary);background:#eff6ff;}
.back-row{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
.save-row{display:flex;justify-content:flex-end;margin-top:14px;}
.history-empty{font-size:14px;color:var(--muted);font-style:italic;text-align:center;padding:20px 0;}
.hist-item{border:1.5px solid var(--border);border-radius:10px;padding:14px;margin-bottom:10px;background:var(--bg);}
.hist-head{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:8px;}
.hist-date{font-size:13px;font-weight:600;color:var(--text);}
.hist-meta{font-size:11px;color:var(--muted);margin-top:2px;display:flex;gap:8px;flex-wrap:wrap;align-items:center;}
.hist-tag{display:inline-flex;align-items:center;gap:3px;padding:1px 7px;border-radius:10px;background:#eff6ff;color:var(--primary);font-weight:600;}
.hist-preview{font-size:13px;color:var(--muted);line-height:1.6;max-height:60px;overflow:hidden;margin-bottom:10px;white-space:pre-wrap;word-break:break-word;}
.hist-actions{display:flex;gap:6px;flex-wrap:wrap;align-items:center;}
.hist-audio{width:100%;height:34px;margin-bottom:10px;}
.btn-danger-ghost{background:transparent;border:1.5px solid var(--border);color:var(--danger);}
.btn-danger-ghost:hover{border-color:var(--danger);background:#fef2f2;}
</style>
</head>
<body>
<div class="container" id="mainView">
  <div class="topbar">
    <button class="icon-btn" id="settingsBtn" onclick="openSettings()" title="환경설정" aria-label="환경설정">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="3"/>
        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
      </svg>
    </button>
    <button class="icon-btn" id="historyBtn" onclick="openHistory()" title="보관함" aria-label="보관함">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 3v5h5"/>
        <path d="M3.05 13A9 9 0 1 0 6 5.3L3 8"/>
        <line x1="12" y1="7" x2="12" y2="12"/>
        <line x1="12" y1="12" x2="15.5" y2="14"/>
      </svg>
    </button>
  </div>
  <header>
    <h1>
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
        <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
        <line x1="12" y1="19" x2="12" y2="23"/>
        <line x1="8" y1="23" x2="16" y2="23"/>
      </svg>
      회의 녹음기
    </h1>
    <p class="subtitle">녹음 · 전사 · AI 요약 한번에</p>
  </header>

  <div class="card">
    <div class="card-title">녹음</div>
    <div class="lang-row">
      <button class="lang-btn active" onclick="setLang('ko-KR',this)">🇰🇷 한국어</button>
      <button class="lang-btn" onclick="setLang('en-US',this)">🇺🇸 English</button>
      <button class="lang-btn" onclick="setLang('zh-CN',this)">🇨🇳 简体中文</button>
      <button class="lang-btn" onclick="setLang('zh-TW',this)">🇹🇼 繁體中文</button>
    </div>
    <div class="record-center">
      <button class="record-btn" id="recordBtn" onclick="toggleRecord()">
        <svg id="micIcon" width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
          <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
          <line x1="12" y1="19" x2="12" y2="23"/>
          <line x1="8" y1="23" x2="16" y2="23"/>
        </svg>
      </button>
      <canvas id="eqCanvas" width="220" height="48"></canvas>
      <div class="status-badge" id="statusBadge">
        <span class="dot"></span>
        <span id="statusText">녹음 시작</span>
      </div>
    </div>
    <div id="errorMsg" class="error-msg" style="display:none;"></div>
  </div>

  <div class="card">
    <div class="card-title">
      <span>전사 내용</span>
      <span class="wc" id="wc"></span>
    </div>
    <div class="transcript-box empty" id="transcriptBox">녹음을 시작하면 음성이 실시간으로 텍스트로 변환됩니다.</div>
    <div class="action-row">
      <button class="btn btn-primary" id="summarizeBtn" onclick="summarize()" disabled>
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
        AI 요약
      </button>
      <div class="divider"></div>
      <button class="btn btn-ghost" id="saveTxtBtn" onclick="saveText()" disabled>📄 텍스트 저장</button>
      <button class="btn btn-ghost" id="saveAudioBtn" onclick="saveAudio()" disabled>🎵 녹음 저장</button>
      <button class="btn btn-ghost" id="archiveBtn" onclick="archiveSession()" disabled>🗄️ 보관함에 저장</button>
      <button class="btn btn-ghost" id="loadFileBtn" onclick="document.getElementById('fileInput').click()">📂 불러오기</button>
      <button class="btn btn-ghost" id="playBtn" onclick="togglePlay()" disabled>▶️ 재생</button>
      <div class="divider"></div>
      <button class="btn btn-ghost" onclick="clearAll()">초기화</button>
    </div>
    <input type="file" id="fileInput" accept="audio/*,text/plain,.txt" style="display:none" onchange="handleFileLoad(event)" />
    <audio id="player" style="display:none"></audio>
  </div>

  <div class="card" id="summaryCard" style="display:none;">
    <div class="card-title">
      <span>AI 요약</span>
      <button class="btn btn-ghost" style="padding:3px 10px;font-size:11px;" onclick="copySummary()">복사</button>
    </div>
    <div class="summary-box" id="summaryBox"></div>
  </div>
</div>

<div class="container" id="settingsView" style="display:none;">
  <div class="back-row">
    <button class="icon-btn" onclick="closeSettings()" title="뒤로" aria-label="뒤로">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="19" y1="12" x2="5" y2="12"/>
        <polyline points="12 19 5 12 12 5"/>
      </svg>
    </button>
  </div>
  <header>
    <h1>
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="3"/>
        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
      </svg>
      환경설정
    </h1>
    <p class="subtitle">API 키를 입력하고 저장하세요</p>
  </header>

  <div class="card">
    <div class="card-title">Anthropic API 키 (AI 요약용)</div>
    <div class="api-key-row">
      <input class="api-input" type="password" id="apiKey" placeholder="sk-ant-..." />
      <button class="btn btn-ghost" onclick="toggleApiVis()">보기</button>
    </div>
    <p class="api-hint">키는 이 기기에만 저장되며 외부로 전송되지 않아요. <a href="https://console.anthropic.com" target="_blank" style="color:var(--primary);">키 발급 →</a></p>
    <div class="save-row">
      <button class="btn btn-primary" onclick="saveApiKey()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
        저장
      </button>
    </div>
  </div>
</div>

<div class="container" id="historyView" style="display:none;">
  <div class="back-row">
    <button class="icon-btn" onclick="closeHistory()" title="뒤로" aria-label="뒤로">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="19" y1="12" x2="5" y2="12"/>
        <polyline points="12 19 5 12 12 5"/>
      </svg>
    </button>
  </div>
  <header>
    <h1>
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 3v5h5"/>
        <path d="M3.05 13A9 9 0 1 0 6 5.3L3 8"/>
        <line x1="12" y1="7" x2="12" y2="12"/>
        <line x1="12" y1="12" x2="15.5" y2="14"/>
      </svg>
      보관함
    </h1>
    <p class="subtitle">저장한 전사·녹음 내역을 불러오고 재생하세요</p>
  </header>

  <div class="card">
    <div class="card-title">
      <span>저장된 회의 내역</span>
      <span class="wc" id="histCount"></span>
    </div>
    <div id="historyList"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const SR = window.SpeechRecognition || window.webkitSpeechRecognition;

let recording    = false;
let finalTx      = '';
let currentLang  = 'ko-KR';
let hasInterim   = false;
let animId       = null;
let recog        = null;
let discarding   = false; // clearAll 중 MediaRecorder onstop 무시 플래그

// MediaRecorder — 녹음 저장 버튼 클릭 시에만 초기화
let micStream    = null;
let mediaRecorder= null;
let audioChunks  = [];
let audioBlob    = null;

// ─────────────────────────────────────────
// SpeechRecognition: 최초 1회 생성, 재사용
// getUserMedia 는 절대 여기서 호출하지 않음
// ─────────────────────────────────────────
function ensureSR() {
  if (recog) { recog.lang = currentLang; return true; }
  if (!SR) { showErr('이 브라우저는 음성 인식을 지원하지 않아요. Chrome/Safari를 사용해 주세요.'); return false; }

  recog = new SR();
  recog.continuous     = true;
  recog.interimResults = true;
  recog.lang           = currentLang;

  recog.onresult = e => {
    let interim = '';
    for (let i = e.resultIndex; i < e.results.length; i++) {
      if (e.results[i].isFinal) { finalTx += e.results[i][0].transcript + ' '; hasInterim = false; }
      else { interim += e.results[i][0].transcript; hasInterim = true; }
    }
    renderTx(interim);
  };

  recog.onspeechend = () => { hasInterim = false; };

  recog.onerror = e => {
    if (e.error === 'no-speech' || e.error === 'network') return;
    if (e.error === 'not-allowed') {
      showErr('마이크 권한이 필요해요. 브라우저 설정에서 허용해 주세요.');
      _forceStop();
    }
  };

  // iOS 포함 자동종료 시 재시작 — 플래그로 안전하게 제어
  recog.onend = () => { if (recording) { try { recog.start(); } catch {} } };
  return true;
}

// ─────────────────────────────────────────
// 녹음 토글
// ─────────────────────────────────────────
function toggleRecord() { recording ? stopRec() : startRec(); }

function startRec() {
  if (!ensureSR()) return;
  recording = true;
  hasInterim = false;
  setRecordingUI();
  startEQ();
  try { recog.start(); } catch {}
  startAudioCapture(); // 녹음 시작과 동시에 오디오 자동 캡처
}

function stopRec() {
  recording = false; // onend 재시작 차단
  if (recog) { try { recog.stop(); } catch {} }
  // MediaRecorder 중지 → onstop에서 blob 생성 및 버튼 활성화
  if (mediaRecorder && mediaRecorder.state !== 'inactive') {
    mediaRecorder.stop();
  }
  stopEQ();
  renderTx(''); // interim 텍스트 제거
  setStoppedUI();
}

// 강제 종료 (권한 오류 등)
function _forceStop() {
  recording = false;
  if (recog) { try { recog.stop(); } catch {} }
  stopEQ();
  renderTx('');
  setStoppedUI();
}

// ─────────────────────────────────────────
// 언어 변경 — fix: EQ/UI 정리 후 SR 재생성
// ─────────────────────────────────────────
function setLang(lang, btn) {
  currentLang = lang;
  document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  if (recording) {
    // 완전히 종료 후 새 언어로 재시작
    recording = false;
    if (recog) { try { recog.onend = null; recog.stop(); } catch {} recog = null; }
    stopEQ();
    setStoppedUI();
    setTimeout(() => startRec(), 300);
  } else {
    // SR 인스턴스만 교체 (lang 변경 반영)
    if (recog) { try { recog.onend = null; recog.stop(); } catch {} recog = null; }
  }
}

// ─────────────────────────────────────────
// 오디오 자동 캡처: 녹음 시작과 동시에 getUserMedia + MediaRecorder
// - 중지 시 onstop에서 blob 생성 (자동 다운로드는 하지 않음)
// - 권한 거부/미지원 시에는 전사만 진행
// ─────────────────────────────────────────
async function startAudioCapture() {
  if (mediaRecorder) return; // 이미 캡처 중 (언어 변경 등으로 재시작된 경우)
  audioChunks = [];
  audioBlob   = null;
  discarding  = false;

  if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia || typeof MediaRecorder === 'undefined') {
    return; // 미지원 브라우저 → 전사만
  }

  let stream;
  try {
    stream = await navigator.mediaDevices.getUserMedia({ audio: true });
  } catch {
    showToast('마이크 녹음 캡처를 시작할 수 없어 전사만 진행해요');
    return;
  }

  // getUserMedia 대기 중 사용자가 이미 중지했다면 스트림 정리 후 종료
  if (!recording) { stream.getTracks().forEach(t => t.stop()); return; }

  micStream = stream;
  try {
    mediaRecorder = new MediaRecorder(micStream);
  } catch {
    releaseMic();
    return;
  }
  mediaRecorder.ondataavailable = e => { if (e.data.size > 0) audioChunks.push(e.data); };
  mediaRecorder.onstop = () => {
    if (discarding) { audioChunks = []; releaseMic(); return; } // clearAll 중이면 무시
    if (audioChunks.length > 0) {
      audioBlob = new Blob(audioChunks, { type: mediaRecorder.mimeType || 'audio/webm' });
    }
    releaseMic();
    document.getElementById('saveAudioBtn').disabled = !audioBlob;
    setAudioForPlayback(audioBlob);   // 방금 녹음한 오디오 재생 가능
    updateArchiveBtn();
  };
  mediaRecorder.start(1000);
}

let playerUrl = null;

function handleFileLoad(e){
  const file = e.target.files && e.target.files[0];
  e.target.value = ''; // 같은 파일을 다시 선택할 수 있도록 초기화
  if (!file) return;
  if (recording) { showToast('녹음 중에는 불러올 수 없어요'); return; }

  const isAudio = file.type.startsWith('audio/') || /\.(webm|ogg|mp4|m4a|mp3|wav|aac|flac)$/i.test(file.name);
  const isText  = file.type.startsWith('text/')  || /\.txt$/i.test(file.name);

  if (isAudio) {
    audioBlob   = file;
    audioChunks = [];
    setAudioForPlayback(file);                                   // 재생 버튼 활성화
    document.getElementById('saveAudioBtn').disabled = false;
    document.getElementById('statusText').textContent = '녹음 불러옴';
    updateArchiveBtn();
    showToast('녹음 파일을 불러왔어요 — ▶️ 재생을 눌러보세요');
  } else if (isText) {
    const reader = new FileReader();
    reader.onload  = () => {
      finalTx = String(reader.result || '').trim() + ' ';
      renderTx('');
      document.getElementById('statusText').textContent = '전사 불러옴';
      showToast('전사 파일을 불러왔어요');
    };
    reader.onerror = () => showToast('파일을 읽을 수 없어요');
    reader.readAsText(file);
  } else {
    showToast('지원하지 않는 파일 형식이에요 (.txt 또는 오디오 파일)');
  }
}

// 재생용 오디오 소스 설정 + 재생 버튼 활성/비활성
function setAudioForPlayback(blob){
  const player  = document.getElementById('player');
  const playBtn = document.getElementById('playBtn');
  try { player.pause(); } catch {}
  if (playerUrl) { try { URL.revokeObjectURL(playerUrl); } catch {} playerUrl = null; }
  if (blob) {
    playerUrl  = URL.createObjectURL(blob);
    player.src = playerUrl;
    playBtn.disabled = false;
  } else {
    player.removeAttribute('src');
    try { player.load(); } catch {}
    playBtn.disabled = true;
  }
  playBtn.textContent = '▶️ 재생';
}

// 재생 / 일시정지 토글
function togglePlay(){
  const player  = document.getElementById('player');
  const playBtn = document.getElementById('playBtn');
  if (!player.getAttribute('src')) { showToast('재생할 녹음이 없어요'); return; }
  player.onended = () => { playBtn.textContent = '▶️ 재생'; };
  if (player.paused) {
    player.play().then(() => { playBtn.textContent = '⏸️ 일시정지'; })
                 .catch(() => showToast('재생할 수 없어요'));
  } else {
    player.pause();
    playBtn.textContent = '▶️ 재생';
  }
}

// ─────────────────────────────────────────
// 이퀄라이저 — roundRect 폴리필 적용 (Safari 구버전 호환)
// ─────────────────────────────────────────
function drawBar(ctx, x, y, w, h, r) {
  if (typeof ctx.roundRect === 'function') {
    ctx.beginPath(); ctx.roundRect(x, y, w, h, r); ctx.fill();
  } else {
    r = Math.min(r, h/2, w/2);
    ctx.beginPath();
    ctx.moveTo(x+r, y); ctx.lineTo(x+w-r, y);
    ctx.arcTo(x+w,y, x+w,y+r, r); ctx.lineTo(x+w,y+h-r);
    ctx.arcTo(x+w,y+h, x+w-r,y+h, r); ctx.lineTo(x+r,y+h);
    ctx.arcTo(x,y+h, x,y+h-r, r); ctx.lineTo(x,y+r);
    ctx.arcTo(x,y, x+r,y, r); ctx.closePath(); ctx.fill();
  }
}

function startEQ() {
  const canvas = document.getElementById('eqCanvas');
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  const bars = 28, barW = Math.floor(W / bars) - 2;
  const heights = new Array(bars).fill(0);
  canvas.style.display = 'block';
  function draw() {
    animId = requestAnimationFrame(draw);
    ctx.clearRect(0, 0, W, H);
    for (let i = 0; i < bars; i++) {
      const bell = 1 - Math.abs(i - bars/2) / (bars/2) * 0.5;
      const t = hasInterim
        ? (Math.random()*0.7+0.25)*bell*H*0.88
        : (Math.random()*0.10+0.02)*H;
      heights[i] += (t - heights[i]) * (hasInterim ? 0.28 : 0.07);
      const h = Math.max(2, heights[i]);
      const g = ctx.createLinearGradient(0, H, 0, H-h);
      g.addColorStop(0,'#2563eb'); g.addColorStop(1,'#93c5fd');
      ctx.fillStyle = g;
      drawBar(ctx, i*(barW+2)+2, H-h, barW, h, 2);
    }
  }
  draw();
}

function stopEQ() {
  cancelAnimationFrame(animId);
  const c = document.getElementById('eqCanvas');
  c.style.display = 'none';
  c.getContext('2d').clearRect(0, 0, c.width, c.height);
  hasInterim = false;
}

// ─────────────────────────────────────────
// 보관함 (전사·녹음 내역) — IndexedDB 저장
// ─────────────────────────────────────────
const DB_NAME = 'meetingRecorder';
const STORE   = 'sessions';
let histUrls  = []; // 렌더 시 생성한 objectURL — 재렌더 전 해제

function idbOpen(){
  return new Promise((resolve,reject)=>{
    const req = indexedDB.open(DB_NAME, 1);
    req.onupgradeneeded = () => {
      const db = req.result;
      if (!db.objectStoreNames.contains(STORE)) {
        db.createObjectStore(STORE, { keyPath:'id', autoIncrement:true });
      }
    };
    req.onsuccess = () => resolve(req.result);
    req.onerror   = () => reject(req.error);
  });
}
function idbTx(mode, fn){
  return idbOpen().then(db => new Promise((resolve,reject)=>{
    const tx = db.transaction(STORE, mode);
    const store = tx.objectStore(STORE);
    let result;
    Promise.resolve(fn(store)).then(r => { result = r; });
    tx.oncomplete = () => { db.close(); resolve(result); };
    tx.onerror    = () => { db.close(); reject(tx.error); };
  }));
}
function idbAdd(record){
  return idbTx('readwrite', store => new Promise((res,rej)=>{
    const r = store.add(record); r.onsuccess=()=>res(r.result); r.onerror=()=>rej(r.error);
  }));
}
function idbGetAll(){
  return idbTx('readonly', store => new Promise((res,rej)=>{
    const r = store.getAll(); r.onsuccess=()=>res(r.result||[]); r.onerror=()=>rej(r.error);
  }));
}
function idbDelete(id){
  return idbTx('readwrite', store => new Promise((res,rej)=>{
    const r = store.delete(id); r.onsuccess=()=>res(); r.onerror=()=>rej(r.error);
  }));
}

function fmtDate(ms){
  try { return new Date(ms).toLocaleString('ko-KR'); } catch { return ''; }
}
function langLabel(code){
  return ({'ko-KR':'🇰🇷 한국어','en-US':'🇺🇸 English','zh-CN':'🇨🇳 简体中文','zh-TW':'🇹🇼 繁體中文'})[code] || code || '';
}

async function renderHistory(){
  releaseHistUrls();
  const listEl = document.getElementById('historyList');
  const countEl = document.getElementById('histCount');
  let items = [];
  try { items = await idbGetAll(); } catch { items = []; }
  items.sort((a,b) => b.createdAt - a.createdAt);

  countEl.textContent = items.length ? items.length + '건' : '';
  listEl.innerHTML = '';

  if (!items.length) {
    const empty = document.createElement('div');
    empty.className = 'history-empty';
    empty.textContent = '아직 저장된 내역이 없어요. 녹음 후 "보관함에 저장"을 눌러보세요.';
    listEl.appendChild(empty);
    return;
  }

  items.forEach(rec => listEl.appendChild(buildHistItem(rec)));
}

function buildHistItem(rec){
  const item = document.createElement('div');
  item.className = 'hist-item';

  // 헤더 (날짜 + 메타)
  const head = document.createElement('div');
  head.className = 'hist-head';
  const left = document.createElement('div');
  const date = document.createElement('div');
  date.className = 'hist-date';
  date.textContent = fmtDate(rec.createdAt);
  const meta = document.createElement('div');
  meta.className = 'hist-meta';
  meta.appendChild(makeTag(langLabel(rec.lang)));
  if (rec.transcript) meta.appendChild(makeTag('📝 ' + rec.words + '단어'));
  if (rec.audio)      meta.appendChild(makeTag('🎵 녹음'));
  left.appendChild(date); left.appendChild(meta);
  head.appendChild(left);
  item.appendChild(head);

  // 전사 미리보기
  if (rec.transcript) {
    const prev = document.createElement('div');
    prev.className = 'hist-preview';
    prev.textContent = rec.transcript.length > 140 ? rec.transcript.slice(0,140) + '…' : rec.transcript;
    item.appendChild(prev);
  }

  // 녹음 재생 플레이어
  if (rec.audio) {
    const url = URL.createObjectURL(rec.audio);
    histUrls.push(url);
    const audio = document.createElement('audio');
    audio.className = 'hist-audio';
    audio.controls = true;
    audio.src = url;
    item.appendChild(audio);
  }

  // 액션 버튼
  const actions = document.createElement('div');
  actions.className = 'hist-actions';

  if (rec.transcript) {
    const loadBtn = document.createElement('button');
    loadBtn.className = 'btn btn-primary';
    loadBtn.textContent = '📄 전사 불러오기';
    loadBtn.onclick = () => loadHistorySession(rec);
    actions.appendChild(loadBtn);
  }
  if (rec.audio) {
    const dlBtn = document.createElement('button');
    dlBtn.className = 'btn btn-ghost';
    dlBtn.textContent = '⬇️ 녹음 다운로드';
    dlBtn.onclick = () => downloadHistAudio(rec);
    actions.appendChild(dlBtn);
  }
  const delBtn = document.createElement('button');
  delBtn.className = 'btn btn-danger-ghost';
  delBtn.textContent = '🗑 삭제';
  delBtn.onclick = () => deleteHistorySession(rec.id);
  actions.appendChild(delBtn);

  item.appendChild(actions);
  return item;
}

function makeTag(text){
  const t = document.createElement('span');
  t.className = 'hist-tag';
  t.textContent = text;
  return t;
}

// 보관된 전사를 메인 화면으로 불러오기
function loadHistorySession(rec){
  if (recording) { showToast('녹음 중에는 불러올 수 없어요'); return; }
  finalTx   = rec.transcript ? rec.transcript.trim() + ' ' : '';
  audioBlob = rec.audio || null;
  audioChunks = [];
  renderTx('');
  document.getElementById('saveAudioBtn').disabled = !audioBlob;
  setAudioForPlayback(audioBlob); // 녹음 포함 세션이면 재생 버튼 활성화
  document.getElementById('statusText').textContent = finalTx.trim() ? '불러옴' : '녹음 시작';
  document.getElementById('summaryCard').style.display = 'none';
  document.getElementById('summaryBox').textContent = '';
  closeHistory();
  showToast('보관함에서 불러왔어요');
}

function downloadHistAudio(rec){
  if (!rec.audio) return;
  const stamp = (() => { const d=new Date(rec.createdAt);
    return `${d.getFullYear()}${pad(d.getMonth()+1)}${pad(d.getDate())}_${pad(d.getHours())}${pad(d.getMinutes())}`; })();
  const mime = rec.mime || rec.audio.type || '';
  const ext  = mime.includes('ogg')?'ogg':mime.includes('mp4')?'mp4':'webm';
  _download(rec.audio, `회의녹음_${stamp}.${ext}`);
  showToast('녹음 파일이 저장됐어요');
}

async function deleteHistorySession(id){
  if (!confirm('이 내역을 삭제할까요? 되돌릴 수 없어요.')) return;
  try { await idbDelete(id); showToast('삭제됐어요'); }
  catch { showToast('삭제에 실패했어요'); }
  renderHistory();
}
</script>
